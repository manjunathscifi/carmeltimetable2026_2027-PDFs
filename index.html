<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table - BA, BCOM, BSC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        header { text-align: center; margin-bottom: 45px; }
        header h1 { font-size: 2.2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        header p { color: #6b7280; font-size: 1.05rem; }
        .courses-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }
        .course-card {
            background: #ffffff;
            border: 2px solid #f3f4f6;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .course-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .course-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(102, 126, 234, 0.15); border-color: #e0e7ff; }
        .course-card:hover::before { transform: scaleX(1); }
        .course-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .course-card:nth-child(2) .course-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .course-card:nth-child(3) .course-icon { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .course-card h3 { font-size: 1.35rem; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
        .course-card .file-type { color: #9ca3af; font-size: 0.875rem; margin-bottom: 20px; font-weight: 500; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
            border: 1px solid #e5e7eb;
        }
        .btn-secondary:hover { background: #e5e7eb; color: #1a1a2e; }
        .footer {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #f3f4f6;
            color: #9ca3af;
            font-size: 0.875rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 900px;
            height: 85vh;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 16px 24px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 1.1rem; color: #1a1a2e; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #6b7280;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: #1a1a2e; }
        .modal-body { flex: 1; overflow: hidden; }
        .modal-body iframe { width: 100%; height: 100%; border: none; }

        /* Desktop: all 3 cards in one horizontal line */
        @media (min-width: 768px) {
            .courses-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Time Table</h1>
            <p>ODD Semester 2026 - 2027</p>
        </header>
        <div class="courses-grid">
            <div class="course-card">
                <div class="course-icon">BSC</div>
                <h3>Bachelor of Science</h3>
                <div class="file-type">PDF Document</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="openPDF('BSC.pdf', 'Bachelor of Science')">👁 View</button>
                    <a href="pdfs/BSC.pdf" download class="btn btn-secondary">⬇ Download</a>
                </div>
            </div>
            <div class="course-card">
                <div class="course-icon">BCOM</div>
                <h3>Bachelor of Commerce</h3>
                <div class="file-type">PDF Document</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="openPDF('BCOM.pdf', 'Bachelor of Commerce')">👁 View</button>
                    <a href="pdfs/BCOM.pdf" download class="btn btn-secondary">⬇ Download</a>
                </div>
            </div>
            <div class="course-card">
                <div class="course-icon">BA</div>
                <h3>Bachelor of Arts</h3>
                <div class="file-type">PDF Document</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="openPDF('BA.pdf', 'Bachelor of Arts')">👁 View</button>
                    <a href="pdfs/BA.pdf" download class="btn btn-secondary">⬇ Download</a>
                </div>
           
    </div>
    <div class="modal" id="pdfModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">PDF Viewer</h3>
                <button class="modal-close" onclick="closePDF()">×</button>
            </div>
            <div class="modal-body">
                <iframe id="pdfFrame" src=""></iframe>
            </div>
        </div>
    </div>
    <script>
        function openPDF(filename, title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('pdfFrame').src = 'pdfs/' + filename;
            document.getElementById('pdfModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closePDF() {
            document.getElementById('pdfModal').classList.remove('active');
            document.getElementById('pdfFrame').src = '';
            document.body.style.overflow = 'auto';
        }
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) closePDF();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePDF();
        });
    </script>
</body>
</html>
